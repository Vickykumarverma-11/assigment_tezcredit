name: assigment_tezcredit
description: "Loan Onboarding App with Clean Architecture and Security Features"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5

  # Networking
  dio: ^5.3.2

  # Camera
  camera: ^0.10.5

  # Navigation
  go_router: ^13.0.0

  # Dependency Injection
  get_it: ^7.6.4

  # Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0

  # Models / Serialization
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1

  # Functional Programming
  dartz: ^0.10.1

  # Hashing
  crypto: ^3.0.3

  # Security
  local_auth: ^2.1.7
  encrypt: ^5.0.3
  device_info_plus: ^9.1.0
  screenshot: ^2.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  bloc_test: ^9.1.5
  mocktail: ^1.0.1

  # Code Generation
  freezed: ^2.4.5
  json_serializable: ^6.7.1
  build_runner: ^2.4.6

flutter:
  uses-material-design: true

  assets:
    - assets/data/
